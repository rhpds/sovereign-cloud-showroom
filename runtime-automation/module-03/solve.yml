---
- name: Module 03 — Technology and Supply Chain Solve
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    quay_password: "{{ quay_admin_password | default('') }}"
    quay_user: "quayadmin"
    # Namespace candidates for the showroom/wetty terminal pod
    showroom_namespace_candidates:
      - "showroom"
      - "showroom-{{ guid | default('') }}"
      - "lab"
      - "wetty"
    tas_namespace: "trusted-artifact-signer"
    rhsso_namespace: "rhsso"

  tasks:

    # ------------------------------------------------------------------
    # Discover Quay route
    # ------------------------------------------------------------------
    - name: Get Quay route
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: route.openshift.io/v1
        kind: Route
        namespace: quay
      register: r_quay_routes
      ignore_errors: true

    - name: Set Quay URL from route
      ansible.builtin.set_fact:
        quay_url: >-
          {{ (r_quay_routes.resources
              | selectattr('metadata.name', 'match', '.*quay.*')
              | list | first).spec.host | default('') }}
      when: r_quay_routes.resources | default([]) | length > 0
      ignore_errors: true

    - name: Fallback — derive Quay URL from cluster domain
      ansible.builtin.set_fact:
        quay_url: "quay.{{ openshift_cluster_ingress_domain | default('apps.' + guid + '.example.com') }}"
      when: quay_url is not defined or quay_url | length == 0

    # ------------------------------------------------------------------
    # Discover showroom terminal pod
    # ------------------------------------------------------------------
    - name: Probe showroom namespace candidates
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        kind: Pod
        namespace: "{{ item }}"
      register: r_ns_probe
      loop: "{{ showroom_namespace_candidates }}"
      ignore_errors: true

    - name: Identify first namespace with pods
      ansible.builtin.set_fact:
        showroom_ns_found: >-
          {{ r_ns_probe.results
             | selectattr('resources', 'defined')
             | selectattr('resources', 'ne', [])
             | map(attribute='item')
             | list | first | default('') }}

    - name: Get all pods in showroom namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        kind: Pod
        namespace: "{{ showroom_ns_found }}"
      register: r_showroom_pods
      when: showroom_ns_found | length > 0
      ignore_errors: true

    - name: Set terminal pod name — prefer wetty/terminal/bastion match
      ansible.builtin.set_fact:
        terminal_pod: >-
          {{ (r_showroom_pods.resources
              | default([])
              | selectattr('status.phase', 'equalto', 'Running')
              | selectattr('metadata.name', 'match', '.*(wetty|showroom|terminal|bastion).*')
              | list | first | default({})).metadata.name | default('') }}
        terminal_ns: "{{ showroom_ns_found }}"
      when: r_showroom_pods.resources is defined
      ignore_errors: true

    - name: Fallback — use first running pod in showroom namespace
      ansible.builtin.set_fact:
        terminal_pod: >-
          {{ (r_showroom_pods.resources
              | default([])
              | selectattr('status.phase', 'equalto', 'Running')
              | list | first | default({})).metadata.name | default('') }}
      when:
        - terminal_pod is not defined or terminal_pod | length == 0
        - r_showroom_pods.resources is defined
      ignore_errors: true

    - name: Report discovered terminal pod
      ansible.builtin.debug:
        msg: "Terminal pod: {{ terminal_pod | default('NOT FOUND') }} in namespace: {{ terminal_ns | default('unknown') }}"

    # ------------------------------------------------------------------
    # block-01 / block-02 — verify cosign present, install if needed
    # ------------------------------------------------------------------
    - name: Check cosign installed; run setup.sh if missing
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ terminal_ns }}"
        pod: "{{ terminal_pod }}"
        command: |
          sh -c 'if ! command -v cosign &>/dev/null; then echo "cosign not found — running setup.sh"; cd ~/svc-lab/tssc-setup && ./setup.sh; else cosign version | head -5; fi'
      when:
        - terminal_pod is defined
        - terminal_pod | length > 0
      register: r_cosign_check
      ignore_errors: true

    # ------------------------------------------------------------------
    # block-01 — podman login to Quay
    # ------------------------------------------------------------------
    - name: Podman login to Quay
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ terminal_ns }}"
        pod: "{{ terminal_pod }}"
        command: "sh -c 'podman login https://{{ quay_url }} -u {{ quay_user }} -p {{ quay_password }} --tls-verify=false'"
      when:
        - terminal_pod is defined
        - terminal_pod | length > 0
        - quay_url | length > 0
        - quay_password | length > 0
      register: r_podman_login
      ignore_errors: true

    # ------------------------------------------------------------------
    # block-03 — pull, tag, push golden Python UBI image
    # ------------------------------------------------------------------
    - name: Pull, tag and push golden Python UBI image to Quay
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ terminal_ns }}"
        pod: "{{ terminal_pod }}"
        command: |
          sh -c '
          set -e
          QUAY_URL="{{ quay_url }}"
          QUAY_USER="{{ quay_user }}"
          SOURCE=registry.access.redhat.com/ubi8/python-312:1-1775513555
          TARGET=${QUAY_URL}/${QUAY_USER}/python-ubi-312:3.12-golden
          if podman manifest inspect ${TARGET} --tls-verify=false 2>/dev/null; then
            echo "Golden image already in Quay — skipping"
          else
            podman pull ${SOURCE}
            podman tag ${SOURCE} ${TARGET}
            podman push --remove-signatures --tls-verify=false ${TARGET}
            echo "Golden image pushed"
          fi
          '
      when:
        - terminal_pod is defined
        - terminal_pod | length > 0
        - quay_url | length > 0
      register: r_golden_image
      ignore_errors: true

    # ------------------------------------------------------------------
    # block-04 / block-05 / block-06 / block-07
    # Update Dockerfile FROM line, build, push patient-portal-frontend
    # ------------------------------------------------------------------
    - name: Update Dockerfile FROM line, build and push patient-portal-frontend
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ terminal_ns }}"
        pod: "{{ terminal_pod }}"
        command: |
          sh -c '
          set -e
          QUAY_URL="{{ quay_url }}"
          QUAY_USER="{{ quay_user }}"
          BUILD_DIR=~/demo-applications/image-builds/patient-portal-frontend
          GOLDEN=${QUAY_URL}/${QUAY_USER}/python-ubi-312:3.12-golden
          TARGET=${QUAY_URL}/${QUAY_USER}/patient-portal-frontend:1.0
          cd ${BUILD_DIR}
          sed -i "s|^FROM docker.io/library/python:3.12-slim|FROM ${GOLDEN}|g" Dockerfile
          echo "Dockerfile FROM line after update:"
          head -5 Dockerfile
          if podman manifest inspect ${TARGET} --tls-verify=false 2>/dev/null; then
            echo "patient-portal-frontend:1.0 already in Quay — skipping build/push"
          else
            echo "Building ${TARGET} ..."
            timeout 600 podman build -t ${TARGET} .
            echo "Pushing ${TARGET} ..."
            podman push --tls-verify=false ${TARGET}
            echo "patient-portal-frontend pushed"
          fi
          '
      when:
        - terminal_pod is defined
        - terminal_pod | length > 0
        - quay_url | length > 0
      register: r_build_push
      ignore_errors: true

    # ------------------------------------------------------------------
    # Discover TUF / Fulcio / Rekor / OIDC URLs from cluster CRs
    # ------------------------------------------------------------------
    - name: Get TUF CR
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: rhtas.redhat.com/v1alpha1
        kind: Tuf
        namespace: "{{ tas_namespace }}"
      register: r_tuf
      ignore_errors: true

    - name: Get Fulcio CR
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: rhtas.redhat.com/v1alpha1
        kind: Fulcio
        namespace: "{{ tas_namespace }}"
      register: r_fulcio
      ignore_errors: true

    - name: Get Rekor CR
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: rhtas.redhat.com/v1alpha1
        kind: Rekor
        namespace: "{{ tas_namespace }}"
      register: r_rekor
      ignore_errors: true

    - name: Get Keycloak route for OIDC issuer URL
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: route.openshift.io/v1
        kind: Route
        name: keycloak
        namespace: "{{ rhsso_namespace }}"
      register: r_keycloak_route
      ignore_errors: true

    - name: Set TAS / OIDC URL facts
      ansible.builtin.set_fact:
        tuf_url: >-
          {{ (r_tuf.resources | default([]) | first | default({})).status.url | default('') }}
        fulcio_url: >-
          {{ (r_fulcio.resources | default([]) | first | default({})).status.url | default('') }}
        rekor_url: >-
          {{ (r_rekor.resources | default([]) | first | default({})).status.url | default('') }}
        oidc_issuer_url: >-
          https://{{ (r_keycloak_route.resources
                      | default([]) | first | default({})).spec.host
                    | default('') }}/auth/realms/openshift
      ignore_errors: true

    # ------------------------------------------------------------------
    # block-09 / block-10 / block-11 / block-12
    # Export sigstore env vars, cosign initialize, cosign login, cosign tree
    # All chained in one k8s_exec so env vars survive between commands.
    # ------------------------------------------------------------------
    - name: Export sigstore env vars, initialize cosign, login and run cosign tree
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ terminal_ns }}"
        pod: "{{ terminal_pod }}"
        command: |
          sh -c '
          set -e
          export TUF_URL="{{ tuf_url }}"
          export OIDC_ISSUER_URL="{{ oidc_issuer_url }}"
          export COSIGN_FULCIO_URL="{{ fulcio_url }}"
          export COSIGN_REKOR_URL="{{ rekor_url }}"
          export COSIGN_MIRROR="${TUF_URL}"
          export COSIGN_ROOT="${TUF_URL}/root.json"
          export COSIGN_OIDC_CLIENT_ID="trusted-artifact-signer"
          export COSIGN_OIDC_ISSUER="${OIDC_ISSUER_URL}"
          export COSIGN_CERTIFICATE_OIDC_ISSUER="${OIDC_ISSUER_URL}"
          export COSIGN_YES="true"
          export SIGSTORE_FULCIO_URL="${COSIGN_FULCIO_URL}"
          export SIGSTORE_OIDC_ISSUER="${COSIGN_OIDC_ISSUER}"
          export SIGSTORE_REKOR_URL="${COSIGN_REKOR_URL}"
          export REKOR_REKOR_SERVER="${COSIGN_REKOR_URL}"
          echo "=== TAS endpoint URLs ==="
          env | grep URL || true
          echo "=== cosign initialize ==="
          cosign initialize
          echo "=== cosign login to Quay ==="
          cosign login {{ quay_url }} -u {{ quay_user }} -p {{ quay_password }}
          echo "=== cosign tree (pre-sign state) ==="
          cosign tree {{ quay_url }}/{{ quay_user }}/patient-portal-frontend:1.0 \
            --allow-insecure-registry || true
          '
      when:
        - terminal_pod is defined
        - terminal_pod | length > 0
        - quay_url | length > 0
        - tuf_url | length > 0
        - quay_password | length > 0
      register: r_cosign_init
      ignore_errors: true

    # ------------------------------------------------------------------
    # block-13 SKIP — cosign sign requires interactive OIDC browser flow
    # ------------------------------------------------------------------
    # SKIP: cosign sign $QUAY_URL/$QUAY_USER/patient-portal-frontend:1.0
    # Not automatable: requires interactive OIDC browser authentication.
    # cosign prompts the student to open a Keycloak URL and paste back a
    # verification code. There is no headless or service-account path for
    # this Keycloak realm. The student must complete this step manually.

    # ------------------------------------------------------------------
    # Final report
    # ------------------------------------------------------------------
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Terminal pod found : {{ 'ok' if (terminal_pod | default('')) | length > 0 else 'NOT ok — no showroom/wetty pod found' }}
          Quay URL           : {{ quay_url | default('NOT resolved') }}
          TUF URL            : {{ tuf_url | default('NOT resolved') }}
          cosign check       : {{ 'ok' if r_cosign_check.rc | default(1) == 0 else 'check logs' }}
          Podman login       : {{ 'ok' if r_podman_login.rc | default(1) == 0 else 'check logs' }}
          Golden image       : {{ 'ok' if r_golden_image.rc | default(1) == 0 else 'check logs' }}
          Frontend build     : {{ 'ok' if r_build_push.rc | default(1) == 0 else 'check logs — build may take up to 10 min' }}
          cosign init+login  : {{ 'ok' if r_cosign_init.rc | default(1) == 0 else 'check logs' }}
          cosign sign        : SKIPPED — requires manual OIDC authentication.
                               Student must run: cosign sign $QUAY_URL/$QUAY_USER/patient-portal-frontend:1.0
                               and complete the Keycloak browser login, then paste the verification code.
                               Come back and click Validate after the signing step is done.
