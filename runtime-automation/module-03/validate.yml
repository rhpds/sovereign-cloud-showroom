---
- name: Module 03 — Technology and Supply Chain Validation
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    quay_password: "{{ quay_admin_password | default('') }}"
    quay_token: "{{ quay_admin_token | default('') }}"
    quay_user: "quayadmin"
    # Bastion SSH vars (injected from user_data by the runner)
    bastion_host: "{{ bastion_public_hostname | default('') }}"
    bastion_port: "{{ bastion_ssh_port | default('22') }}"
    bastion_user: "{{ bastion_ssh_user_name | default('lab-user') }}"
    bastion_pass: "{{ bastion_ssh_password | default('') }}"
    tas_namespace: "trusted-artifact-signer"
    keycloak_namespace_candidates:
      - "keycloak"
      - "rhsso"

  tasks:

    # ------------------------------------------------------------------
    # Discover Quay route
    # ------------------------------------------------------------------
    - name: Get Quay route
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: route.openshift.io/v1
        kind: Route
        namespace: quay
      register: r_quay_routes
      ignore_errors: true

    - name: Set Quay URL from route
      ansible.builtin.set_fact:
        quay_url: >-
          {{ (r_quay_routes.resources
              | selectattr('metadata.name', 'match', '.*quay.*')
              | list | first).spec.host | default('') }}
      when: r_quay_routes.resources | default([]) | length > 0
      ignore_errors: true

    - name: Fallback — derive Quay URL from cluster domain
      ansible.builtin.set_fact:
        quay_url: "quay.{{ openshift_cluster_ingress_domain | default('apps.' + guid + '.example.com') }}"
      when: quay_url is not defined or quay_url | length == 0

    # -------------------------------------------------------
    # Check 1 — cosign binary present on bastion
    # -------------------------------------------------------
    - name: Check cosign binary version on bastion
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - >-
            sshpass -p {{ bastion_pass | quote }}
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30
            -p {{ bastion_port }}
            {{ bastion_user }}@{{ bastion_host }}
            'cosign version > /dev/null 2>&1 && echo ok || echo missing'
      register: r_cosign_binary
      changed_when: false
      when: bastion_host | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Check 2 — Golden Python UBI image in Quay
    # Uses Bearer token (quay_admin_token) — Quay API requires OAuth token, not basic auth
    # -------------------------------------------------------
    - name: Check python-ubi-312:3.12-golden exists in Quay
      ansible.builtin.uri:
        url: "https://{{ quay_url }}/api/v1/repository/quayadmin/python-ubi-312/tag/?specificTag=3.12-golden"
        method: GET
        headers:
          Authorization: "Bearer {{ quay_token }}"
        validate_certs: false
        timeout: 15
        status_code: [200]
      register: r_golden_tag
      ignore_errors: true

    # -------------------------------------------------------
    # Check 3 — patient-portal-frontend:1.0 in Quay
    # -------------------------------------------------------
    - name: Check patient-portal-frontend:1.0 exists in Quay
      ansible.builtin.uri:
        url: "https://{{ quay_url }}/api/v1/repository/quayadmin/patient-portal-frontend/tag/?specificTag=1.0"
        method: GET
        headers:
          Authorization: "Bearer {{ quay_token }}"
        validate_certs: false
        timeout: 15
        status_code: [200]
      register: r_frontend_tag
      ignore_errors: true

    # -------------------------------------------------------
    # Check 4 — Dockerfile FROM line updated to golden image
    # -------------------------------------------------------
    - name: Check Dockerfile FROM line references golden image on bastion
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - >-
            sshpass -p {{ bastion_pass | quote }}
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30
            -p {{ bastion_port }}
            {{ bastion_user }}@{{ bastion_host }}
            'grep -q "python-ubi-312"
            ~/demo-applications/image-builds/patient-portal-frontend/Dockerfile
            && echo ok || echo missing'
      register: r_dockerfile
      changed_when: false
      when: bastion_host | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Check 5 — cosign TUF initialized (~/.sigstore exists)
    # -------------------------------------------------------
    - name: Check ~/.sigstore directory exists on bastion
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - >-
            sshpass -p {{ bastion_pass | quote }}
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30
            -p {{ bastion_port }}
            {{ bastion_user }}@{{ bastion_host }}
            'test -d ~/.sigstore && echo ok || echo missing'
      register: r_sigstore_dir
      changed_when: false
      when: bastion_host | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Check 6 — TAS CRs (TUF, Fulcio, Rekor) have status.url
    # -------------------------------------------------------
    - name: Get TUF CR
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: rhtas.redhat.com/v1alpha1
        kind: Tuf
        namespace: "{{ tas_namespace }}"
      register: r_tuf
      ignore_errors: true

    - name: Get Fulcio CR
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: rhtas.redhat.com/v1alpha1
        kind: Fulcio
        namespace: "{{ tas_namespace }}"
      register: r_fulcio
      ignore_errors: true

    - name: Get Rekor CR
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: rhtas.redhat.com/v1alpha1
        kind: Rekor
        namespace: "{{ tas_namespace }}"
      register: r_rekor
      ignore_errors: true

    # -------------------------------------------------------
    # Check 7 — Keycloak route is healthy (discover namespace)
    # -------------------------------------------------------
    - name: Probe Keycloak namespace candidates
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: route.openshift.io/v1
        kind: Route
        namespace: "{{ item }}"
      register: r_kc_ns_probe
      loop: "{{ keycloak_namespace_candidates }}"
      ignore_errors: true

    - name: Set Keycloak namespace fact
      ansible.builtin.set_fact:
        keycloak_ns: >-
          {{ r_kc_ns_probe.results
             | selectattr('resources', 'defined')
             | selectattr('resources', 'ne', [])
             | map(attribute='item')
             | list | first | default('keycloak') }}

    - name: Get Keycloak route
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: route.openshift.io/v1
        kind: Route
        namespace: "{{ keycloak_ns }}"
      register: r_keycloak_route
      ignore_errors: true

    - name: Set Keycloak URL
      ansible.builtin.set_fact:
        keycloak_url: >-
          https://{{ (r_keycloak_route.resources | default([])
                      | selectattr('metadata.name', 'match', '.*keycloak.*')
                      | list | first | default(
                        r_keycloak_route.resources | default([]) | first | default({})
                      )).spec.host
                    | default('') }}
      when: r_keycloak_route.resources | default([]) | length > 0

    - name: Check Keycloak route is reachable
      ansible.builtin.uri:
        url: "{{ keycloak_url }}"
        method: GET
        validate_certs: false
        timeout: 10
        status_code: [200, 301, 302]
      register: r_keycloak_health
      when: keycloak_url is defined and (keycloak_url | length) > 10
      ignore_errors: true

    # -------------------------------------------------------
    # Check 8 — Signature artifacts exist (cosign tree shows .sig tag)
    # -------------------------------------------------------
    - name: Check cosign tree for signature artifacts on bastion
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - >-
            sshpass -p {{ bastion_pass | quote }}
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30
            -p {{ bastion_port }}
            {{ bastion_user }}@{{ bastion_host }}
            'cosign tree {{ quay_url }}/quayadmin/patient-portal-frontend:1.0
            --allow-insecure-registry 2>&1 | grep -q "sha256-.*\.sig" && echo signed || echo unsigned'
      register: r_cosign_sig
      changed_when: false
      when:
        - bastion_host | length > 0
        - quay_url | length > 0
      ignore_errors: true

    # ------------------------------------------------------------------
    # Build result facts
    # ------------------------------------------------------------------
    - name: Build task results
      ansible.builtin.set_fact:
        _task1_ok: >-
          {{ bastion_host | length > 0
             and r_cosign_binary is defined and r_cosign_binary is not skipped
             and r_cosign_binary.rc | default(1) == 0
             and 'ok' in (r_cosign_binary.stdout | default('')) }}
        _task2_ok: >-
          {{ r_golden_tag is defined and r_golden_tag is not failed
             and (r_golden_tag.json.tags | default([]) | length) > 0 }}
        _task3_ok: >-
          {{ r_frontend_tag is defined and r_frontend_tag is not failed
             and (r_frontend_tag.json.tags | default([]) | length) > 0 }}
        _task4_ok: >-
          {{ bastion_host | length > 0
             and r_dockerfile is defined and r_dockerfile is not skipped
             and r_dockerfile.rc | default(1) == 0
             and 'ok' in (r_dockerfile.stdout | default('')) }}
        _task5_ok: >-
          {{ bastion_host | length > 0
             and r_sigstore_dir is defined and r_sigstore_dir is not skipped
             and r_sigstore_dir.rc | default(1) == 0
             and 'ok' in (r_sigstore_dir.stdout | default('')) }}
        _task6_ok: >-
          {{ (r_tuf.resources | default([]) | first | default({})).status.url | default('') | length > 0
             and (r_fulcio.resources | default([]) | first | default({})).status.url | default('') | length > 0
             and (r_rekor.resources | default([]) | first | default({})).status.url | default('') | length > 0 }}
        _task7_ok: >-
          {{ r_keycloak_health is defined and r_keycloak_health is not failed
             and r_keycloak_health is not skipped }}
        _task8_ok: >-
          {{ bastion_host | length > 0
             and r_cosign_sig is defined and r_cosign_sig is not skipped
             and r_cosign_sig.rc | default(1) == 0
             and 'signed' in (r_cosign_sig.stdout | default('')) }}

    # ------------------------------------------------------------------
    # Validate all tasks
    # ------------------------------------------------------------------
    - name: Validate all tasks
      ansible.builtin.assert:
        that: >-
          {{ _task1_ok and _task2_ok and _task3_ok and _task4_ok
             and _task5_ok and _task6_ok and _task7_ok and _task8_ok }}
        success_msg: |
          Task 1: cosign binary present on bastion
          Task 2: python-ubi-312:3.12-golden image exists in Quay
          Task 3: patient-portal-frontend:1.0 image exists in Quay
          Task 4: Dockerfile FROM line updated to golden image
          Task 5: cosign TUF initialized (~/.sigstore exists)
          Task 6: TUF, Fulcio, and Rekor CRs all have status URLs
          Task 7: Keycloak route is reachable
          Task 8: Signature artifacts present for patient-portal-frontend:1.0
        fail_msg: |
          {{ 'Task 1: cosign binary present on bastion' if _task1_ok
             else 'Task 1: cosign binary not found — run the setup.sh script from ~/svc-lab/tssc-setup/setup.sh' }}
          {{ 'Task 2: python-ubi-312:3.12-golden image exists in Quay' if _task2_ok
             else 'Task 2: python-ubi-312:3.12-golden not found in Quay — pull, tag, and push the golden image per the lab instructions' }}
          {{ 'Task 3: patient-portal-frontend:1.0 image exists in Quay' if _task3_ok
             else 'Task 3: patient-portal-frontend:1.0 not found in Quay — build and push the image using the updated Dockerfile' }}
          {{ 'Task 4: Dockerfile FROM line updated to golden image' if _task4_ok
             else 'Task 4: Dockerfile still references original base image — update the FROM line to point to python-ubi-312:3.12-golden in Quay' }}
          {{ 'Task 5: cosign TUF initialized (~/.sigstore exists)' if _task5_ok
             else 'Task 5: ~/.sigstore not found — run cosign initialize with the correct TUF_URL set' }}
          {{ 'Task 6: TUF, Fulcio, and Rekor CRs all have status URLs' if _task6_ok
             else 'Task 6: One or more TAS CRs missing status URL — check trusted-artifact-signer namespace for TUF/Fulcio/Rekor operator status' }}
          {{ 'Task 7: Keycloak route is reachable' if _task7_ok
             else 'Task 7: Keycloak route unreachable — check the keycloak/rhsso namespace and verify the keycloak route exists' }}
          {{ 'Task 8: Signature artifacts present for patient-portal-frontend:1.0' if _task8_ok
             else 'Task 8: No signature found — run: cosign sign $QUAY_URL/quayadmin/patient-portal-frontend:1.0 and complete the Keycloak browser login, then click Validate again' }}
