---
site:
  title: LB6534 - Sovereign Cloud Architecture with OpenShift, Multi-Cluster Data Residency and Compliance Management
  url: https://redhat-scholars.github.io/course-template
  start_page: modules::index.adoc

content:
  sources:
  - url: .
    start_path: content

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/v2.0.2/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./content/supplemental-ui
    - path: ./content/lib
    - path: .nojekyll
    - path: ui.yml
      contents: "static_files: [ .nojekyll ]"

runtime:
  cache_dir: ./.cache/antora

antora:
  extensions:
  - require: ./content/lib/dev-mode.js
    enabled: true

output:
  dir: ./www
