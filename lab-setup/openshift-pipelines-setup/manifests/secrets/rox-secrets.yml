# Secret consumed by Tekton tasks and by Pipelines rox-pipeline and rox-log4shell-pipeline
# (params rox_central_endpoint / rox_api_token reference this Secret by name: roxsecrets).
#
# Do not "oc apply" this file as-is: stringData below are placeholders.
# Run lab-setup/08-openshift-pipelines-setup.sh so the secret is generated from env/route values.
apiVersion: v1
kind: Secret
metadata:
  name: roxsecrets
  namespace: pipeline-demo
type: Opaque
stringData:
  rox_central_endpoint: "ROXCTL_CENTRAL_ENDPOINT"
  rox_api_token: "API_TOKEN"
